naftiko: 1.0.0-alpha2
info:
  label: AmTrust Financial Services Commercial Lines API — Appetite
  description: 'AmTrust Financial Services Commercial Lines API — Appetite. 1 operations. Lead operation: AmTrust Financial
    Services Check Coverage Appetite. Self-contained Naftiko capability covering one Amtrust Financial Services business surface.'
  tags:
  - Amtrust Financial Services
  - Appetite
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMTRUST_FINANCIAL_SERVICES_API_KEY: AMTRUST_FINANCIAL_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: commercial-lines-appetite
    baseUri: https://api.amtrustservices.com
    description: AmTrust Financial Services Commercial Lines API — Appetite business capability. Self-contained, no shared
      references.
    resources:
    - name: v1-appetite
      path: /v1/appetite
      operations:
      - name: checkappetite
        method: POST
        description: AmTrust Financial Services Check Coverage Appetite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.AMTRUST_FINANCIAL_SERVICES_API_KEY}}'
  exposes:
  - type: rest
    namespace: commercial-lines-appetite-rest
    port: 8080
    description: REST adapter for AmTrust Financial Services Commercial Lines API — Appetite. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/appetite
      name: v1-appetite
      description: REST surface for v1-appetite.
      operations:
      - method: POST
        name: checkappetite
        description: AmTrust Financial Services Check Coverage Appetite
        call: commercial-lines-appetite.checkappetite
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: commercial-lines-appetite-mcp
    port: 9090
    transport: http
    description: MCP adapter for AmTrust Financial Services Commercial Lines API — Appetite. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: amtrust-financial-services-check-coverage
      description: AmTrust Financial Services Check Coverage Appetite
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: commercial-lines-appetite.checkappetite
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
