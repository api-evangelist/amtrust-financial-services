naftiko: 1.0.0-alpha2
info:
  label: AmTrust Financial Services Commercial Lines API — Authentication
  description: 'AmTrust Financial Services Commercial Lines API — Authentication. 1 operations. Lead operation: AmTrust Financial
    Services Get Access Token. Self-contained Naftiko capability covering one Amtrust Financial Services business surface.'
  tags:
  - Amtrust Financial Services
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMTRUST_FINANCIAL_SERVICES_API_KEY: AMTRUST_FINANCIAL_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: commercial-lines-authentication
    baseUri: https://api.amtrustservices.com
    description: AmTrust Financial Services Commercial Lines API — Authentication business capability. Self-contained, no
      shared references.
    resources:
    - name: oauth-token
      path: /oauth/token
      operations:
      - name: getaccesstoken
        method: POST
        description: AmTrust Financial Services Get Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.AMTRUST_FINANCIAL_SERVICES_API_KEY}}'
  exposes:
  - type: rest
    namespace: commercial-lines-authentication-rest
    port: 8080
    description: REST adapter for AmTrust Financial Services Commercial Lines API — Authentication. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/oauth/token
      name: oauth-token
      description: REST surface for oauth-token.
      operations:
      - method: POST
        name: getaccesstoken
        description: AmTrust Financial Services Get Access Token
        call: commercial-lines-authentication.getaccesstoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: commercial-lines-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for AmTrust Financial Services Commercial Lines API — Authentication. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: amtrust-financial-services-get-access
      description: AmTrust Financial Services Get Access Token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: commercial-lines-authentication.getaccesstoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
